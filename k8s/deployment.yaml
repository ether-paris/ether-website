apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ether
  name: ether-website
  labels:
    app: ether-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ether-website
  template:
    metadata:
      labels:
        app: ether-website
    spec:
      nodeSelector:
        role: worker
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ether-website
          image: ghcr.io/ether-paris/ether-website:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: ether-website-secrets
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: DB_PATH
              value: "/data/visitors.sqlite"
            - name: ORIGIN
              value: "https://ether.paris"
            - name: BASE_URL
              value: "https://ether.paris"
            - name: SERVER_IP
              value: "135.181.95.61"
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_S3_BUCKET
              value: "ether-yamls"
            - name: STALWART_API_URL
              value: "https://mail.ether.paris/api"
            - name: STALWART_ADMIN_USER
              value: "admin"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: visitors-storage
              mountPath: /data
      volumes:
        - name: visitors-storage
          persistentVolumeClaim:
            claimName: visitors-pvc
