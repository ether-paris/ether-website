apiVersion: v1
kind: Secret
metadata:
  name: ether-website-secrets
  namespace: ether
type: Opaque
stringData:
  ADMIN_PASSWORD: "replace-with-strong-admin-password"
  GITHUB_CLIENT_ID: "replace-with-github-oauth-client-id"
  GITHUB_CLIENT_SECRET: "replace-with-github-oauth-client-secret"
  CLOUDFLARE_API_TOKEN: "replace-with-cloudflare-api-token"
  CLOUDFLARE_ZONE_ID: "replace-with-cloudflare-zone-id"
  AWS_ACCESS_KEY_ID: "replace-with-aws-access-key-id"
  AWS_SECRET_ACCESS_KEY: "replace-with-aws-secret-access-key"
  STALWART_ADMIN_PASSWORD: "replace-with-stalwart-admin-password"
  RESEDN_EMAIL_TOKEN: "re_replace_with_resend_api_key"
  RESEND_CONTACT_EMAIL: "contact@ether.paris"
